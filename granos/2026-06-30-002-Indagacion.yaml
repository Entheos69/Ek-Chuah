  inscripciones:
  - local_id: i1
    premisa: 'Antes de construir la capa de componentes del genoma estetico (Paso
      7 de la base), verificar la arquitectura CSS de cascade vigente en 2026 para
      el sistema de diseno: como organizar componentes sin guerras de especificidad.

      '
    busqueda:
    - CSS @layer cascade layers design system 2026 best practices component architecture
    resultados_crudos:
    - fuente: devtoolbox.dedyn.io
      texto: 'proven architecture: @layer reset, base, components, utilities, overrides'
    - fuente: css-cascade-layers.com
      texto: :where() zeroes specificity
    - fuente: explainx.ai
      texto: explicitly define priority order for different CSS sources
    conclusion: '@layer es el estandar 2026 de sistemas de diseno: fija el orden del
      cascade independiente de la especificidad y elimina !important. La arquitectura
      probada pone los componentes en su capa (@layer components) con :where() para
      especificidad cero, de modo que el proyecto sobrescriba sin pelear. Se adopta
      para components.css.

      '
    inferidor:
      model: estratega/claude-opus-4.8
      ts: '2026-06-30T17:40:00'
  - local_id: i2
    premisa: 'La capa de componentes debe servir 3 marcas (ETCS/SystemaTip/FarmaQ)
      sobre una estructura compartida. Verificar el patron 2026 de multi-marca con
      tokens: como lograr una estructura y N pieles sin duplicar componentes.

      '
    busqueda:
    - design tokens CSS custom properties multi-brand theming 2026 data-theme scoping
    resultados_crudos:
    - fuente: penpot.app
      texto: define base tokens globally, then override specific tokens within theme
        selectors
    - fuente: productrocket.ro
      texto: Components reference semantic tokens, so they adapt automatically without
        code changes
    - fuente: webtoolshub.online
      texto: all refer to the same hex value in different files
    conclusion: 'El patron multi-marca 2026 es [data-brand] (o data-theme) que redefine
      solo la capa semantica; como las variables CSS son vivas, los componentes que
      referencian semanticos se re-skinean solos sin recompilar. Calza con las dos
      capas ya existentes del genoma (primitivo->semantico). La fractura de tokens
      -mismos valores en variables distintas- es el problema #1 documentado del sector;
      un token unico la previene, y el linter anti-fractura la hace ejecutable.

      '
    inferidor:
      model: estratega/claude-opus-4.8
      ts: '2026-06-30T17:41:00'
  necesidad:
