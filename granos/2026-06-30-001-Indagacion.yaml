  - local_id: i1
    premisa: 'Antes de fijar en el TRD la estrategia de aislamiento multimarca del
      CRM, verificar contra evidencia 2026 el estado y la madurez de las opciones
      de multi-tenancy en Django 5.2 (schema-por-tenant vs row-level), en vez de decidir
      de memoria.

      '
    busqueda:
    - django-tenants Django 5.2 compatibility 2025 multi-tenant schema
    resultados_crudos:
    - fuente: pypi.org/project/django-tenants
      texto: Tenant support for Django using PostgreSQL schemas
    - fuente: testdriven.io/blog/django-multi-tenant
      texto: each tenant is assigned its schema and a domain name
    - fuente: pypi.org/project/django-tenant-users
      texto: 'Django :: 5.2'
    conclusion: 'Schema-por-marca via django-tenants es el fit: modelo "base compartida,
      schemas separados", tenant resuelto por hostname (calza con 3 marcas = 3 dominios),
      aislamiento por construccion y compatible con Django 5.2 (django-tenant-users
      lo declara). Se elige sobre row-level por honrar el aislamiento-desde-el-dia-cero
      con solo 3 tenants fijos, donde la complejidad dinamica de SaaS casi no aplica.
      Interpretacion fechada, no dato.

      '
    inferidor:
      model: estratega/claude-opus-4-8
      ts: '2026-06-30T11:00:00'
  - local_id: i2
    premisa: 'Antes de fijar en el TRD el mecanismo de countdowns y escalamientos
      (riesgo de scheduler en Railway), verificar contra evidencia 2026 las opciones
      de tareas en segundo plano en Django y su costo operativo (Celery vs Django-Q2
      vs cron).

      '
    busqueda:
    - Django background tasks scheduler 2026 Django-Q2 vs Celery Railway cron comparison
    resultados_crudos:
    - fuente: technetexperts.com
      texto: Django Q2 integrates scheduling natively into the Django Admin interface
    - fuente: loopwerk.io
      texto: scheduled tasks can at most run once a minute
    - fuente: softaims.com
      texto: Celery with a Redis broker remains the production standard
    conclusion: 'Django-Q2 es el fit para este CRM: usa el ORM como broker (sin Redis),
      agenda de forma nativa y deja logs visibles en admin (alinea con visibilidad,
      Art. IV). Su limite de "una vez por minuto" es irrelevante porque los countdowns
      se miden en horas/dias. Celery queda como sobreingenieria a esta escala. Interpretacion
      fechada, no dato.

      '
    inferidor:
      model: estratega/claude-opus-4-8
      ts: '2026-06-30T11:06:00'
