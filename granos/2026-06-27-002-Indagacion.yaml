ek_chuah_aec:
  meta:
    schema_version: aec-1
    session_id: 2026-06-27-002-Indagacion
    consolidado_por: Guardian
    project: ek-chuah
  inscripciones:
  - local_id: i1
    premisa: 'El Bibliotecario tiene un corpus heterogeneo (MD, HTML, HTML-DC, DOCX,
      PDF) cuyos conceptos hay que extraer y dejar disponibles para una busqueda tipo
      grafo. Necesidad no-endemica: investigar tecnologias y desarrollos vigentes
      que lo permitan, sin asumir un stack pesado (Neo4j) antes de ver alternativas
      que reusen lo que ya hay (Postgres + pgvector).

      '
    busqueda:
    - GraphRAG knowledge graph extraction from documents 2026
    - LightRAG vs nano-graphrag PostgreSQL pgvector storage backend
    - Docling vs Unstructured document parsing PDF DOCX HTML to markdown 2026
    resultados_crudos:
    - fuente: LightRAG (lightrag-hku, PyPI/GitHub)
      texto: a one-stop solution ... as KV store, VectorDB (pgvector) and GraphDB
        (apache AGE)
    - fuente: LightRAG (HKUDS, GitHub)
      texto: The Embedding model must be determined before document indexing
    - fuente: jimysancho/graphrag-psql (GitHub)
      texto: The graph tool is still networkx
    - fuente: Latent Space - LightRAG variants (jaesolshin.com)
      texto: ApeRAG does not use Apache AGE ... plain PostgreSQL relational tables
    - fuente: Docling (IBM Research, GitHub)
      texto: Parsing of multiple document formats including PDF, DOCX, PPTX, XLSX,
        HTML
    - fuente: Docling paper (via heidloff.net)
      texto: a cost-effective, accurate and transparent open-source library with a
        permissive MIT license
    conclusion: 'El campo se polarizo en dos filosofias: GraphRAG (extraccion con
      LLM + deteccion de comunidades, potente pero cara de construir y afinar) y LightRAG/nano-graphrag
      (extraccion ligera de entidades+relaciones, el punto dulce para un operador
      solo). Hallazgo clave para el stack: LightRAG corre enteramente sobre Postgres
      como solucion unica (KV + pgvector + Apache AGE), sin necesidad de Neo4j; y
      existen variantes que ni siquiera usan AGE, modelando el grafo como tablas relacionales.
      Para el corpus heterogeneo, Docling parsea PDF/DOCX/HTML a markdown/JSON preservando
      estructura (offline-capable). Insight propio del stack: los HTML-DC ya traen
      capa JSON machine-readable, asi que su parseo es casi gratis. Decomposicion
      en tres capas: parseo / extraccion / almacen. Esto fundo la decision B-local.

      '
    inferidor:
      model: estratega/claude-opus-4
      ts: '2026-06-19T10:30:00'
