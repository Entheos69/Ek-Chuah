  inscripciones:
  - local_id: i1
    premisa: 'Para justificar la diferencia de precio de un CRM a la medida ($51k,
      pago unico) frente a soluciones comerciales, se necesita el costo VIGENTE de
      los CRM comerciales por usuario/mes y su realidad de TCO (implementacion, alzas,
      lock-in). Sin cifras frescas, el argumento de precio es opinion, no evidencia.

      '
    busqueda:
    - Salesforce CRM pricing per user per month 2026 Sales Cloud tiers
    - HubSpot Zoho CRM pricing 2026 per user month customization limits owned vs subscription
    resultados_crudos:
    - fuente: leadhaste.com/blog/salesforce-pricing-2026
      texto: growing sales teams land on Enterprise at $175 per user per month
    - fuente: costbench.com (Vendr, 2,216 compras)
      texto: median annual spend of $74,700
    - fuente: method.me/blog/how-much-does-salesforce-cost
      texto: 6% increase across most of its pricing plans
    - fuente: integrateiq.com/comparisons/hubspot-vs-zoho
      texto: Enterprise at $150/seat/mo adds custom objects
    - fuente: checkthat.ai/brands/zoho-corporation/pricing
      texto: Zoho CRM Enterprise runs $40/user/month compared to Salesforce
    - fuente: zeeg.me/en/blog/post/zoho-crm-pricing
      texto: Microsoft Dynamics 365 charges $65 per user per month
    conclusion: 'Los CRM comerciales son por-asiento, recurrentes a perpetuidad y
      con lock-in de datos. Premium (Salesforce Enterprise ~$175/usuario, gasto anual
      mediano real ~$74,700, alza ~6%/ano; HubSpot Enterprise $150; Dynamics $65):
      el desarrollo a la medida gana TCO y ajuste (cruce <2 anos sumando implementacion
      y multimarca). Gama baja (Zoho Enterprise $40, ~77% bajo Salesforce): no se
      compite en precio (cruce ~18 anos) sino en ajuste, propiedad y el muro multimarca,
      ya que la personalizacion profunda topa limites de nivel y exige un desarrollador
      igual. Lectura re-derivable, no dato: el precio de lista es piso, no total.

      '
    inferidor:
      model: estratega/claude-opus-4.8
      ts: '2026-06-29T17:10:00'
