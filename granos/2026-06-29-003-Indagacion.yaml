  - local_id: i1
    premisa: 'El ''globo de comunicacion'' de Alex es superficie PUSH proactiva con
      riesgo conocido de fatiga (S44). Falta evidencia exogena de cuando una intervencion
      proactiva ayuda vs estorba (intrusividad) y bajo que criterio el asistente debe
      callar, para anclar la gobernanza anti-fatiga ya decidida en cs_.

      '
    busqueda:
    - proactive AI assistant intrusiveness when to interrupt
    resultados_crudos:
    - fuente: windowsforum.com (Clippy->Copilot thread)
      texto: Instead of reducing friction, the assistant often added another layer
        of cognitive load.
    - fuente: arxiv.org/html/2410.04596v1 (CHI 2025, Need Help?)
      texto: irrelevant and untimely proactive messages may compromise the success
        of the interaction
    conclusion: 'Evidencia externa convergente: la proactividad mal calibrada anade
      carga cognitiva en vez de reducir friccion (leccion Clippy->Copilot), y toda
      intervencion proactiva debe pesar beneficio vs costo de intrusion, decidiendo
      por timing/contexto si interviene o calla (CHI 2025). Sostiene la gobernanza
      anti-fatiga del globo: PULL por defecto, PUSH solo cuando beneficio > costo.
      Saber callar es funcion critica, no ausencia de feature. Lectura re-derivable.

      '
    inferidor:
      model: estratega/claude-opus-4.8
      ts: '2026-06-29T11:00:00'
